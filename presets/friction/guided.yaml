# Friction preset: guided (ADR-0016 D-9, light-AFK).
# Auto-advance the mechanical pipeline through self-review; team
# interactions stay supervised (request_review fires its widget with a
# stand-by option); the merge is a strictly human action through the PR
# UI (merge: skip — the agent's merge step does not exist).
#
# Shipped source of truth for the resolver — see strict.yaml header.
plan_approval: auto-advance
batch_layout: auto-advance
strategy_choice: auto-advance
artifact_preview: auto-advance
triage_response: auto-advance-if-bot
thread_resolution: auto-advance-if-bot
comment_hide: auto-advance
yagni_routing: auto-advance
shipping_continuation: auto-advance
request_review: ask
external_notify: ask
merge: skip
completion_signoff: ask
history_rewrite: auto-advance-if-safe
workspace_choice: auto-advance
branch_cleanup: auto-advance-if-merged
session_adoption: auto-advance-if-stale-free
zero_valid_autoflow: true
autofix_confidence: 70
batch_ambiguity_floor: 3
anchor_recommendations: true
doubt_sink: pr-description
