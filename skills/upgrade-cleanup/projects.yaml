# Project roots to scan for .claude/settings.local.json
# Each root is scanned recursively for settings files containing
# versioned plugin paths. Worktree directories (.worktrees/) are
# included automatically.
#
# Copy this file to ~/.claude/skills/Dev10x:upgrade-cleanup/
# and customize with your own project roots:
#   update-paths.py --init

plugin_cache: ~/.claude/plugins/cache/Dev10x-Guru/Dev10x

roots: []
#  - /work/my-projects
#  - /work/team-repos

include_user_settings: true

# Workspace directories that must be registered with Claude Code for
# Write/Edit/Read tools to operate without per-call permission prompts.
# Allow-rules alone are NOT sufficient for paths outside the project
# root (GH-40). These are added under permissions.additionalDirectories
# in every settings file.
workspace_directories:
  - /tmp/Dev10x
  # GH-254: skills read playbook overrides, plan-sync state, and
  # plugin assets from these well-known locations. Without them,
  # the additionalDirectories gate fires per-Read/Bash even when
  # the underlying tool is allowed.
  - ~/.claude/memory
  - ~/.claude/plugins
  - ~/.config/Dev10x

# Base permissions that update-paths.py --ensure-base will add to every
# settings.local.json if missing.  These are stable, version-independent
# rules that every Dev10x plugin user needs.
#
# GH-98:  gh CLI patterns
# GH-120: /tmp/Dev10x/git/ temp file access
# GH-274: /tmp/Dev10x/bin/mktmp.sh for all namespaces
# GH-101: plugin cache broad rule (covers ${CLAUDE_PLUGIN_ROOT} scripts)
base_permissions:
  # --- Plugin infrastructure (GH-274, GH-101, GH-426) ---
  - "Bash(/tmp/Dev10x/bin/mktmp.sh:*)"

  # --- Plugin scripts: bin/ ---
  - "Bash(~/.claude/plugins/cache/**/bin/release.sh:*)"
  - "Bash(~/.claude/plugins/cache/**/bin/require-tool.sh:*)"
  - "Bash(~/.claude/plugins/cache/**/bin/statusline.sh:*)"

  # --- Plugin scripts: hooks/ ---
  - "Bash(~/.claude/plugins/cache/**/hooks/scripts/permission-denied.py:*)"
  - "Bash(~/.claude/plugins/cache/**/hooks/scripts/precompact-context.py:*)"
  # Manual-invocation hook: dev10x.hooks.session.session_reload can be
  # called directly to refresh session state without restart. Not
  # registered in hooks.json because it's on-demand, not automatic.
  # The audit may flag this as "unused" — keep it; the auditor lacks
  # context that it serves manual reloads.
  - "Bash(~/.claude/plugins/cache/**/hooks/scripts/session-start-reload.py:*)"
  - "Bash(~/.claude/plugins/cache/**/hooks/scripts/task-plan-sync.py:*)"
