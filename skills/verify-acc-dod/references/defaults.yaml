# Default acceptance criteria with executable checks
# Plugin-owned — updates propagate automatically to all projects.
# Repo overrides: ~/.claude/memory/Dev10x/dod-acceptance-criteria.yaml
#
# Schema per check:
#   name:             Human-readable criterion name (required)
#   check:            Shell command to run (use {pr_number}, {repo}, and
#                     {base_branch} placeholders — {base_branch} avoids a
#                     hardcoded develop so main-only repos work, GH-854 F2)
#                     Special values:
#                       "manual"  — ask the user via AskUserQuestion
#                       "prompt"  — Claude evaluates the prompt from session context
#   expect:           Exact expected output (trimmed)
#   expect_contains:  Output must contain this substring
#   expect_not_contains: Output must NOT contain this substring
#   expect_gt:        Output (parsed as number) must be greater than this value
#   prompt:           For "manual": question shown to user
#                     For "prompt": instruction Claude evaluates contextually
#   modes:            Per-mode overrides (optional). Map of mode name
#                     to {skip: true} to skip when that mode is active.
#                     Resolve active_modes from the DURABLE gate policy —
#                     global ~/.config/Dev10x/friction.yaml (projects[]
#                     match), falling back to legacy .claude/Dev10x/config.yaml.
#                     NOT the retired ephemeral .claude/Dev10x/session.yaml
#                     (ADR-0018, GH-854 F3).
#
# Only one expect_* field per check. First match wins.

defaults:
  feature:
    checks:
      - name: Working copy clean
        check: git status --porcelain
        expect: ""
      - name: CI passing
        check: gh pr checks {pr_number} --repo {repo}  # cli-friction: allow raw-gh-pr — DoD runner executes this shell template directly
        expect_contains: "All checks were successful"
      - name: PR not draft
        check: gh pr view {pr_number} --repo {repo} --json isDraft -q .isDraft  # cli-friction: allow raw-gh-pr — DoD runner executes this shell template directly
        expect: "false"
      - name: No fixup commits
        check: git log --oneline origin/{base_branch}..HEAD
        expect_not_contains: "fixup!"
      - name: Skill routing compliance
        check: prompt
        prompt: >
          Review the session for skill routing violations: were all
          test runs delegated to the test skill (not raw pytest/uv
          run pytest)? Were all commits created via Dev10x:git-commit
          (not raw git commit)? Were all pushes via Dev10x:git (not
          raw git push)? Check iterative loops especially — the first
          iteration often uses the skill but subsequent iterations
          fall back to raw CLI.
      - name: Fixes-linked issue scope delivered
        check: prompt
        prompt: >
          For each Fixes:/Closes: link on the PR, compare the linked
          issue's title and acceptance criteria against the diff (git
          diff origin/{base_branch}..HEAD). FAIL when a titled capability is
          unbuilt — tell-tales: new production code with no non-test
          caller, or a review comment / unchecked checklist item noting
          remaining work. A Fixes: link auto-closes its issue on merge
          regardless of disclosure, so this catches self-disclosed cuts
          too. On failure, recommend: drop or narrow the Fixes: link, or
          split the undelivered scope into a tracked follow-up issue
          before merge.
      - name: No unresolved review threads
        check: >
          gh pr view {pr_number} --repo {repo}
          --json reviewThreads -q '[.reviewThreads[] | select(.isResolved == false)] | length'  # cli-friction: allow raw-gh-pr — DoD runner executes this shell template directly
        expect: "0"
        modes:
          review-deferred:
            skip: true
      - name: Review requested
        check: >
          gh pr view {pr_number} --repo {repo}
          --json reviewRequests -q '.reviewRequests | length'  # cli-friction: allow raw-gh-pr — DoD runner executes this shell template directly
        expect_gt: 0
        modes:
          solo-maintainer:
            skip: true
          review-deferred:
            skip: true

  bugfix:
