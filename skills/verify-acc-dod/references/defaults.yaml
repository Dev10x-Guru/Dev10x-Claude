  local-only:
    checks:
      - name: Working copy clean
        check: git status --porcelain
        expect: ""
      - name: Changes verified
        check: manual
        prompt: "Were changes verified locally (tests pass, lint clean)?"

  investigation:
    checks:
      - name: Findings documented
        check: manual
        prompt: "Are findings documented with clear next steps?"

  fanout:
    checks:
      - name: All child PRs merged
        check: manual
        prompt: "Are all child work items merged or documented?"
      - name: No orphaned branches
        check: manual
        prompt: "Are there any orphaned branches or draft PRs remaining?"
