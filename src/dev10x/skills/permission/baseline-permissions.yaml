  # ─── Opt-in sensitive read surfaces (GH-601, S1; D7) ────────────────
  # These reads use benign verbs (read/get/list/search) but touch
  # sensitive TARGETS, so the manifest's sensitivity axis (GH-600) flags
  # them non-default-safe. They are tier 3 / opt-in — enable per project
  # with `dev10x permission doctor --enable-group=<name>`. The proactive
  # seed (GH-603) never auto-promotes a non-benign group.

  mcp-google-workspace-readonly:
    tier: 3
    sensitivity: pii
    description: >
      Google Drive / Gmail / Calendar read-only MCP tools (evidence #5).
      The verbs are benign but the data is personal (PII), so this group
      is OPT-IN — never seeded by default. Write tools (create/update/
      delete/label/send) are absent regardless.
    rules:
      - mcp__claude_ai_Google_Drive__search_files
      - mcp__claude_ai_Google_Drive__read_file_content
      - mcp__claude_ai_Google_Drive__get_file_metadata
      - mcp__claude_ai_Google_Drive__get_file_permissions
      - mcp__claude_ai_Google_Drive__list_recent_files
      - mcp__claude_ai_Google_Drive__download_file_content
      - mcp__claude_ai_Gmail__search_threads
      - mcp__claude_ai_Gmail__get_thread
      - mcp__claude_ai_Gmail__list_labels
      - mcp__claude_ai_Gmail__list_drafts
      - mcp__claude_ai_Google_Calendar__list_calendars
      - mcp__claude_ai_Google_Calendar__list_events
      - mcp__claude_ai_Google_Calendar__get_event
      - mcp__claude_ai_Google_Calendar__suggest_time

  secrets-listing-readonly:
    tier: 3
    sensitivity: secret
    description: >
      Secret / env-var NAME listings (D7). Enumerating which secrets exist
      is a reconnaissance step (see domain/sensitivity.py SECRET), so these
      reads are OPT-IN even though a bare list never prints values.
    rules:
      - Bash(vercel env ls:*)
      - Bash(gh secret list:*)
      - Bash(gh variable list:*)

# ─── DEPRECATIONS ─────────────────────────────────────────────────────
# Rules the doctor should rewrite or remove on sweep.

# GH-715: version-pinned plugin paths are NOT canonicalized to `**`
# wildcards here. `**` matching is unreliable in the permission engine, so
# pinned paths are refreshed in place by `dev10x permission update-paths`
# on every upgrade instead of being rewritten to a wildcard.
deprecations:
  - pattern: '^Bash\(/tmp/claude/bin/mktmp\.sh:\*\)$'
    reason: >
      Legacy mktmp shell helper. Superseded by MCP tool
      `mcp__plugin_Dev10x_cli__mktmp`.
    action: remove

# ─── INVARIANTS THE DOCTOR ENFORCES ───────────────────────────────────

invariants:
  - id: no-resolved-plugin-cache
    description: >
      No allow rule may reference a resolved plugin cache path. Use
      `${CLAUDE_PLUGIN_ROOT}`, or a version-pinned `~/.claude/plugins/
      cache/<pub>/<plugin>/<version>/` path kept current by
      `update-paths`. Do NOT use a `**` wildcard (GH-715) — `**`
      matching is unreliable in the permission engine.
  - id: no-cross-project-paths
    description: >
      No allow rule may reference another project's absolute path
      (cross-contamination from copy-pasted settings).
  - id: no-worktree-source-paths
    description: >
      When CWD is a worktree, allow rules must not reference the source
      repository by absolute path — the same files exist inside the
      worktree at relative paths. Detect via `git rev-parse --git-common-dir`.
  - id: additional-directories-not-bash
    description: >
      Bash allow rules cannot substitute for `additionalDirectories`.
      When a prompt persists with a matching Bash rule, diagnose path
      scope first.
  - id: no-redundant-readonly-builtins
    description: >
      Built-in read-only commands (find, grep, ls, cat, head, tail, wc,
      diff, stat, du, cd) must NOT be added as allow rules — they're
      redundant and clutter the list.

# ─── DOCTOR CONSUMPTION ───────────────────────────────────────────────
# How `Dev10x:plugin-maintenance` consumes this catalog:
#
# 1. Tier 1 + Tier 2 groups: merged into the active base_permissions
#    set during `ensure-base`. Missing rules are added.
# 2. Tier 3 groups: opt-in via `dev10x permission doctor
#    --enable-group=<name>`. Not added by default.
# 3. Deprecations:
#    - `action: remove` → drop the rule entirely.
#    - `action: canonicalize` → normalize the rule string by collapsing
#      duplicate slashes (`//` → `/`, GH-704). It NEVER rewrites a path
#      into a `**` wildcard (GH-715). No shipped entry uses it today.
# 4. Invariants: surfaced as warnings during `dev10x permission doctor`;
#    not auto-applied (require user confirmation).
