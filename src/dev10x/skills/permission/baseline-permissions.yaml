  dev10x-scaffolding:
    tier: 1
    description: >
      Shared scaffolding for Dev10x skills. Plugin scripts use
      `${CLAUDE_PLUGIN_ROOT}` so they survive upgrades.
    rules:
      - Skill(Dev10x:*)
      - Read(/tmp/claude/git/**)
      - Write(/tmp/claude/git/**)
      - Read(/tmp/Dev10x/**)
      - Write(/tmp/Dev10x/**)
