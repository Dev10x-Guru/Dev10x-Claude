# Validation rules — single source of truth for command blocking,
# skill redirection, and Edit/Write security enforcement.
#
# Used by:
#   - skill_redirect.py (Bash PreToolUse hook)
#   - validate-edit-write.py (Edit|Write PreToolUse hook)
#   - Dev10x:diag-friction (skill — advisory only;
#     formerly Dev10x:skill-reinforcement)
#
# Per-project override: place a custom version at:
#   ~/.claude/memory/Dev10x/diag-friction.yaml
# The hook merges override rules (user entries take precedence).
#
# Schema:
#   config:
#     friction_level: strict | guided | adaptive
#     plugin_repo: URL for filing issues when skills instruct blocked commands
#
#   rules[]:
#     name:             unique identifier
#     matcher:          tool matcher (Bash | Edit|Write)
#     patterns:         list of regex patterns to match commands
#     except:           list of strings — if any present, rule is skipped
#     hook_block:       true to enforce via hook (exit 2), false for advisory only
#     compensations[]:  list of remediation options (first = recommended)
#       type:           use-skill | split-commands | change-cwd | use-alias
#                       | use-file-flag | use-tool | use-alternative | file-issue
#       skill:          skill name (for use-skill)
#       tool:           tool name (for use-tool)
#       alias:          alias name (for use-alias)
#       guardrails:     what the skill enforces (for use-skill)
#       fallback:       manual fallback instructions (for use-skill)
#       description:    human-readable guidance
#     reason:           why this rule exists
#     related:          list of related skill names
#
#     Edit|Write specific fields:
#       file_pattern:     regex on full file path
#       file_names:       exact basename matches
#       file_prefixes:    basename prefix matches
#       file_substrings:  substring matches on full path
#       content_pattern:  regex on content being written (new_string or content)

config:
  friction_level: guided  # strict | guided | adaptive
  plugin_repo: https://github.com/Dev10x-Guru/dev10x-claude

rules:
  # ── Bash command rules ─────────────────────────────────────

  - name: git-commit
    matcher: Bash
    patterns:
      - git commit
    except:
      - "--fixup"
      - "--amend"
      - "-F /tmp/Dev10x/git/"
    hook_block: true
    compensations:
      - type: use-skill
        skill: Dev10x:git-commit
        guardrails: gitmoji prefix, JTBD outcome title, 72-char limit
        fallback: >
          If Skill(Dev10x:git-commit) fails, apply guardrails manually:
          (1) prefix with gitmoji, (2) include ticket ID from branch,
          (3) keep title under 72 chars, (4) use -F with temp file
          (not -m), (5) add Fixes: footer.
    reason: >
      Direct git commit bypasses gitmoji prefix, ticket ID
      extraction from branch name, and 72-char line limit
      enforcement.
    related:
      - Dev10x:git-groom

  - name: gh-pr-create
    matcher: Bash
    patterns:
      - gh pr create
    except: []
    hook_block: true
    compensations:
      - type: use-skill
        skill: Dev10x:gh-pr-create
        guardrails: Job Story body, ticket linking, commit list, summary comment
        fallback: >
          If Skill(Dev10x:gh-pr-create) fails, apply guardrails manually:
          (1) start body with JTBD Job Story, (2) add Fixes: issue URL,
          (3) create as draft (--draft), (4) include commit list.
    reason: >
      Direct gh pr create skips Job Story drafting, commit list
      generation, and issue tracker linking.

  - name: gh-pr-merge
    matcher: Bash
    patterns:
      - gh pr merge
    except: []
    hook_block: true
    compensations:
      - type: use-skill
        skill: Dev10x:gh-pr-merge
        guardrails: 9 pre-merge checks (unresolved threads, CI, draft, mergeability, working copy, fixup commits, approval, Fixes-linked scope, branch protection)
        fallback: >
          The skill's Step 5 executes the merge via
          `mcp__plugin_Dev10x_cli__merge_pr` (GH-232) — symmetric
          to `create_pr` / `push_safe`. Do NOT bypass this with
          `DEV10X_SKIP_CMD_VALIDATION=true gh pr merge ...`; that
          flag is reserved for transient MCP-unavailability
          emergencies, not the documented flow. If the MCP tool is
          unavailable, stop and ask the user to reconnect via
          `/mcp` rather than running raw `gh pr merge`.
    reason: >
      Direct gh pr merge bypasses the 9 pre-merge checks the skill
      enforces. Adaptive friction does not waive the skill body —
      see references/friction-levels.md.

  - name: git-push
    matcher: Bash
    patterns:
      - git push
    except:
      - "--force-with-lease"
    hook_block: true
    compensations:
      - type: use-skill
        skill: Dev10x:git
        guardrails: protected branch checks, force-push safety
        fallback: >
          Re-invoke the skill with the right parameters before
          escalating. The MCP form is
          `mcp__plugin_Dev10x_cli__push_safe(args=["origin","BRANCH"])`
          and the `protected_branches` parameter overrides the
          default `[main, develop]` block list per call. Solo
          maintainers pushing to develop pass
          `protected_branches=["main"]`; pushing to main passes
          `protected_branches=[]`. Do NOT use
          DEV10X_SKIP_CMD_VALIDATION=true to bypass — that flag is
          reserved for skill-internal exceptions, not for callers.
          Manual fallback only when the MCP tool is unavailable:
          (1) verify branch is not develop/main, (2) use
          --force-with-lease (never --force) if rebased, (3) push
          with upstream tracking (-u flag).
    reason: >
      Direct git push bypasses force-push protection on
      develop/main branches.
    related:
      - Dev10x:git-commit
      - Dev10x:git-groom

  - name: git-rebase-interactive
    matcher: Bash
    patterns:
      - git rebase -i
      - git rebase --interactive
    except: []
    hook_block: true
    compensations:
      - type: use-skill
        skill: Dev10x:git-groom
        guardrails: atomic commits, convention enforcement, non-interactive rebase
        fallback: >
          If Skill(Dev10x:git-groom) fails, run rebase manually with
          GIT_SEQUENCE_EDITOR=true to auto-accept the default sequence,
          then fixup any out-of-order commits.
    reason: >
      Direct interactive rebase may trigger editor prompts and
      bypasses atomic commit and convention enforcement.

  - name: gh-pr-checks-watch
    matcher: Bash
    patterns:
      - gh pr checks --watch
      - gh pr checks -w
    except: []
    hook_block: true
    compensations:
      - type: use-skill
        skill: Dev10x:gh-pr-monitor
        guardrails: failure detection, fixup commits, re-monitoring after push
        fallback: >
          If Skill(Dev10x:gh-pr-monitor) fails, monitor manually:
          (1) poll gh pr checks until all pass, (2) fix any failures,
          (3) mark PR ready with gh pr ready.
    reason: >
      Direct gh pr checks --watch exits on first result; the skill
      loops, fixes CI failures, addresses comments, and requests review.

  - name: gh-pr-view
    matcher: Bash
    patterns:
      - gh pr view
    except:
      # DoD-runner / skill check templates that legitimately need raw
      # `gh pr view` carry this marker in the command string so they
      # bypass the block (GH-668). Used by verify-acc-dod defaults.yaml
      # checks ("PR not draft", "Review requested") executed verbatim
      # via Bash. Plain agent `gh pr view` calls (no marker) still block
      # and route to pr_get, which now exposes the same fields.
      - "cli-friction: allow raw-gh-pr"
    hook_block: true
    compensations:
      - type: use-tool
        tool: mcp__plugin_Dev10x_cli__pr_get
        guardrails: structured responses, no Bash permission friction
        description: >
          If the MCP server is unavailable, use gh pr view directly
          and parse the JSON output manually with --json flag.
    reason: >
      Direct gh pr view requires Bash permission approval on every
      call. The MCP tool provides structured JSON (number, title,
      body, state, baseRefName, headRefName, mergedAt, closedAt,
      labels, milestone, assignees, author, url, isDraft, mergeable,
      reviewDecision, reviewRequests) and avoids permission friction.
      The isDraft/mergeable/reviewDecision/reviewRequests fields
      (GH-668) make pr_get a drop-in for gh-pr-merge Checks 3/4/7.

  - name: gh-issue-close
    matcher: Bash
    patterns:
      - gh issue close
    except: []
    hook_block: true
    compensations:
      - type: use-tool
        tool: mcp__plugin_Dev10x_cli__issue_close
        guardrails: structured responses, no Bash permission friction
        description: >
          If the MCP server is unavailable, use gh issue close N
          --reason <completed|not_planned> directly.
    reason: >
      Direct gh issue close changes issue state and requires per-call
      Bash permission. The MCP tool accepts reason and optional
      closing comment and avoids friction.

  - name: gh-issue-reopen
    matcher: Bash
    patterns:
      - gh issue reopen
    except: []
    hook_block: true
    compensations:
      - type: use-tool
        tool: mcp__plugin_Dev10x_cli__issue_reopen
        guardrails: structured responses, no Bash permission friction
        description: >
          If the MCP server is unavailable, use gh issue reopen N
          directly.
    reason: >
      Direct gh issue reopen changes issue state and requires per-call
      Bash permission. The MCP tool returns structured responses and
      avoids friction.

  - name: gh-issue-view
    matcher: Bash
    patterns:
      - gh issue view
    except: []
    hook_block: true
    compensations:
      - type: use-tool
        tool: mcp__plugin_Dev10x_cli__issue_get
        guardrails: structured responses, no Bash permission friction
        description: >
          If the MCP server is unavailable, use gh issue view directly
          and parse the JSON output manually with --json flag.
    reason: >
      Direct gh issue view requires Bash permission approval on
      every call. The MCP tool provides structured JSON responses
      and avoids permission friction.

  - name: gh-issue-create
    matcher: Bash
    patterns:
      - gh issue create
    except:
      - "--body-file"
    hook_block: true
    compensations:
      - type: use-tool
        tool: mcp__plugin_Dev10x_cli__issue_create
        guardrails: structured responses, no Bash permission friction
        description: >
          If the MCP server is unavailable, use gh issue create directly
          with --title and --body flags.
    reason: >
      Direct gh issue create requires Bash permission approval on
      every call. The MCP tool provides structured JSON responses
      and avoids permission friction.

  - name: gh-pr-edit
    matcher: Bash
    patterns:
      - gh pr edit
    except: []
    hook_block: true
    compensations:
      - type: use-tool
        tool: mcp__plugin_Dev10x_cli__update_pr
        guardrails: structured responses, no Bash permission friction
        description: >
          If the MCP server is unavailable, use gh pr edit directly
          with the required flags (--title, --body-file, --add-label,
          --milestone, --base).
    reason: >
      Direct gh pr edit mutates PR metadata (title, body, labels,
      base) and bypasses the gh-pr-create "update mode" guardrails.
      The MCP tool provides structured responses and avoids per-call
      Bash permission friction.

  - name: gh-pr-ready
    matcher: Bash
    patterns:
      - gh pr ready
    except: []
    hook_block: true
    compensations:
      - type: use-tool
        tool: mcp__plugin_Dev10x_cli__pr_ready
        guardrails: structured responses, no Bash permission friction
        description: >
          If the MCP server is unavailable, run gh pr ready <pr>
          --repo <owner/repo> directly.
    reason: >
      The draft flag is not PATCHable via update_pr, so un-drafting
      needs gh pr ready. The pr_ready MCP tool (GH-779) wraps it with
      structured responses and no per-call Bash permission friction —
      and repos whose CI skips drafts must mark ready before Monitor CI.

  - name: gh-issue-edit
    matcher: Bash
    patterns:
      - gh issue edit
    except: []
    hook_block: true
    compensations:
      - type: use-tool
        tool: mcp__plugin_Dev10x_cli__issue_edit
        guardrails: structured responses, no Bash permission friction
        description: >
          If the MCP server is unavailable, use gh issue edit directly
          with --title, --body-file, --milestone, --add-label.
    reason: >
      Direct gh issue edit mutates issue metadata (title, body,
      milestone, labels) and requires per-call Bash permission. The
      MCP tool provides structured responses and avoids friction.

  - name: gh-issue-comment
    matcher: Bash
    patterns:
      - gh issue comment
    except: []
    hook_block: true
    compensations:
      - type: use-tool
        tool: mcp__plugin_Dev10x_cli__issue_comment
        guardrails: structured responses, body written to temp file safely
        description: >
          If the MCP server is unavailable, use gh issue comment N
          --body-file <tmp> so quoting/heredocs don't bite.
    reason: >
      Direct gh issue comment requires Bash permission per call and
      forces callers to manage heredoc/quoting. The MCP tool writes
      the body to a temp file and returns the comment permalink.

  - name: gh-issue-list
    matcher: Bash
    patterns:
      - gh issue list
    except: []
    hook_block: false
    compensations:
      - type: use-tool
        tool: mcp__plugin_Dev10x_cli__issue_list
        guardrails: structured JSON responses, label/milestone/search filtering
        description: >
          gh issue list works directly when needed. The MCP tool is
          preferred because it returns structured JSON without the
          --json flag boilerplate.
    reason: >
      gh issue list is read-only — advisory route to the MCP tool
      for structured responses and consistency with other list tools.

  - name: gh-milestone-create
    matcher: Bash
    patterns:
      - "gh api .*/milestones --method POST"
      - "gh api .*/milestones -X POST"
    except: []
    hook_block: true
    compensations:
      - type: use-tool
        tool: mcp__plugin_Dev10x_cli__milestone_create
        guardrails: structured responses, no raw gh api POST in transcripts
        description: >
          If the MCP server is unavailable, the raw gh api POST is the
          documented fallback — but the MCP tool is preferred so the
          milestone CRUD path stays uniform with milestone_close.
    reason: >
      Raw gh api POST against the milestones endpoint bypasses the
      structural "no MCP path means file a ticket" principle. Use the
      MCP tool instead.

  - name: git-push-safe-script
    matcher: Bash
    patterns:
      - git-push-safe.sh
    except: []
    hook_block: true
    compensations:
      - type: use-tool
        tool: mcp__plugin_Dev10x_cli__push_safe
        guardrails: structured responses, protected branch checks, no Bash friction
        description: >
          If the MCP server is unavailable, use raw git push with manual
          validation: verify the target branch is not main/develop, then
          use --force-with-lease (never --force) if rebased.
    reason: >
      Direct git-push-safe.sh script invocation bypasses structured
      responses and requires Bash permission on every call. The MCP
      tool provides safe push validation with no permission friction.

  # ── Advisory-only Bash rules (hook_block: false) ───────────

  - name: kubectl
    matcher: Bash
    patterns:
      - kubectl
      - aws-vault exec.*kubectl
    hook_block: false
    compensations:
      - type: use-skill
        skill: Dev10x:k8s
    reason: >
      Direct kubectl calls bypass aws-vault authentication and
      may use wrong credentials or target wrong cluster.
    related:
      - Dev10x:aws-vault

  - name: gh-pr-review
    matcher: Bash
    patterns:
      - gh pr review
    hook_block: false
    compensations:
      - type: use-skill
        skill: Dev10x:gh-pr-review
    reason: >
      Direct gh pr review skips structured review checklist and
      domain-specific agent routing.

  - name: psql
    matcher: Bash
    patterns:
      - psql
      - aws-vault exec.*psql
    hook_block: false
    compensations:
      - type: use-skill
        skill: Dev10x:db-psql
    reason: >
      Direct psql calls bypass SQL validation hooks and may
      accidentally execute write operations.
    related:
      - Dev10x:db
      - tt:db

  - name: aws-vault
    matcher: Bash
    patterns:
      - aws secretsmanager
      - aws-vault exec
    hook_block: false
    compensations:
      - type: use-skill
        skill: Dev10x:aws-vault
    reason: >
      Direct aws CLI calls bypass credential management and
      environment-specific profile selection.

  - name: slack-api
    matcher: Bash
    patterns:
      - curl.*slack.com/api
      - curl.*hooks.slack.com
    hook_block: false
    compensations:
      - type: use-skill
        skill: Dev10x:slack
    reason: >
      Direct Slack API calls bypass token management and
      structured message formatting.

  - name: playwright
    matcher: Bash
    patterns:
      - playwright
      - npx playwright
      - uv run.*playwright
    hook_block: false
    compensations:
      - type: use-skill
        skill: Dev10x:playwright
    reason: >
      Direct playwright calls skip CF Access header injection
      and credential management for staging environments.

  - name: pytest
    matcher: Bash
    patterns:
      - pytest
      - python -m pytest
      - uv run pytest
    hook_block: false
    compensations:
      - type: use-skill
        skill: Dev10x:py-test
        guardrails: 100% coverage gate, concise pass/fail summaries, cwd-aware uv run wrapping
        fallback: >
          If Skill(Dev10x:py-test) is unavailable, run pytest with coverage
          (`pytest --cov --cov-report=term-missing`) and verify 100%
          coverage on changed files manually.
    reason: >
      Bare pytest invocations bypass the test skill's coverage gate
      and concise summary formatting. Audit (GH-155) caught 4 bare
      pytest calls before commits/PR with no coverage verification.

      Advisory only (hook_block: false) — the hard-block flipped in
      GH-155 broke Dev10x:py-test itself, which internally invokes
      `uv run pytest --cov ...` and hit the same hook recursively.
      Restoring advisory behavior pending the skill-context-aware
      hook protocol (GH-271 Phase 8).

  - name: node-tests
    matcher: Bash
    patterns:
      - jest
      - npx jest
      - yarn test
      - yarn .* test
      - npm test
      - npm run test
      - pnpm test
      - vitest
    hook_block: false
    compensations:
      - type: use-tool
        tool: mcp__plugin_Dev10x_cli__run_node_tests
        guardrails: routes off the Bash layer, sidesteps the brace-expansion core-harness block
        fallback: >
          If the run_node_tests MCP tool is unavailable, reload the MCP
          server (/mcp) and retry; as a last resort run the test command
          in a `!` shell so the brace-expansion block does not apply.
    reason: >
      jest / `yarn … test` otherwise run through the Bash layer, where a
      quoted-brace coverage glob (`--collectCoverageFrom="…{ts,tsx}"`)
      trips the core-harness brace-expansion check that no allow-rule can
      suppress (GH-703 evidence #36). The run_node_tests MCP wrapper
      sidesteps the Bash layer entirely.

      Advisory only (hook_block: false) — mirrors the pytest rule; the
      wrapper is the steer, not a hard block.

  - name: gh-pr-comment-reply
    matcher: Bash
    patterns:
      - "gh api --method POST repos/.*/pulls/.*/comments/.*/replies"
    hook_block: false
    compensations:
      - type: use-skill
        skill: Dev10x:gh-pr-fixup
    reason: >
      PR comment replies for VALID review comments must go through
      the fixup skill's push+reply atomic workflow. Raw gh api
      replies bypass fixup commit creation and thread management.
    related:
      - Dev10x:gh-pr-respond
      - Dev10x:gh-pr-triage

  - name: gh-review-threads-graphql
    matcher: Bash
    patterns:
      # Raw reviewThreads GraphQL across its heredoc / brace / cmd-subst
      # variants, plus the inline pulls/comments REST shape (GH-598).
      - "gh api graphql.*reviewThreads"
      - "reviewThreads\\(first"
      - "gh api repos/.*/pulls/.*/comments"
    hook_block: false
    compensations:
      - type: use-tool
        tool: mcp__plugin_Dev10x_cli__unresolved_threads
        guardrails: structured unresolved-thread results, no raw graphql
      - type: use-tool
        tool: mcp__plugin_Dev10x_cli__pr_comments
        guardrails: structured comment list, no raw pulls/comments REST
    reason: >
      Raw `gh api graphql` for review threads recurs across heredoc,
      brace, and command-substitution variants — each trips a different
      non-allow-listable core-harness check (brace/heredoc/cmd-subst).
      Use the `unresolved_threads` / `pr_comments` wrappers instead;
      they run the reviewThreads query and return structured results
      without the friction (GH-598).
    related:
      - Dev10x:gh-pr-merge
      - Dev10x:gh-pr-review

  - name: sentry-api
    matcher: Bash
    patterns:
      - curl.*sentry
    hook_block: false
    compensations:
      - type: use-skill
        skill: Dev10x:investigate
    reason: >
      The investigate skill combines Sentry, codebase search,
      and Slack thread context for structured root-cause analysis.

  - name: python3-inline
    matcher: Bash
    patterns:
      - python3 -c
    hook_block: false
    compensations:
      - type: use-tool
        tool: Read
        description: Use the Read tool for file inspection
      - type: use-alternative
        description: Write a standalone uv script for complex processing
    reason: >
      Inline python3 -c is hook-blocked. Use the Read tool to
      inspect files, or write a standalone uv script for complex
      processing.

  - name: bash-n
    matcher: Bash
    patterns:
      - bash -n
    hook_block: false
    compensations:
      - type: use-alternative
        description: Use shellcheck for deeper analysis including quoting, portability, and style
    reason: >
      bash -n only checks syntax errors. shellcheck provides
      deeper analysis including quoting issues, portability
      warnings, and style suggestions.

  - name: uv-extra-dev
    matcher: Bash
    patterns:
      - uv run --extra dev
      - uv run --extra
    hook_block: false
    compensations:
      - type: use-alternative
        description: Use uv run directly without --extra dev flag
    reason: >
      The --extra dev flag is unnecessary in dev10x-ai repos
      where dev dependencies are available by default. Use
      uv run directly.

  - name: mktmp-bash-fallback
    matcher: Bash
    patterns:
      - /tmp/Dev10x/bin/mktmp\.sh
      - bin/mktmp\.sh
    hook_block: false
    compensations:
      - type: use-tool
        tool: mcp__plugin_Dev10x_cli__mktmp
        guardrails: structured response, no Bash permission friction
        description: >
          Call the MCP tool with namespace, prefix, ext, and (optional)
          directory/create flags. The shell script is the deployed
          fallback and should only run inside other shell scripts that
          execute outside Claude's tool-use protocol.
    reason: >
      The bash fallback works but adds permission friction (Bash
      allow-rule needed) and returns plain stdout. The MCP tool
      returns structured JSON with the path, matches the file-
      not-pre-created semantics introduced by GH-39, and lives in
      the routing table for skills.
    related:
      - Dev10x:git-commit
      - Dev10x:gh-pr-create

  - name: ci-loop-handrolled
    matcher: Bash
    patterns:
      - "while.*gh pr checks"
      - "for .*gh pr checks"
      - "sleep.*gh pr (checks|view)"
      - "gh pr (checks|view).*sleep"
    hook_block: false
    compensations:
      - type: use-tool
        tool: mcp__plugin_Dev10x_cli__ci_check_status
        guardrails: server-side poll with wait=true, structured verdict
        description: >
          Call ci_check_status(wait=true) for a single server-side poll
          that returns a structured pass/fail/unknown verdict — no
          bespoke loop needed.
      - type: use-skill
        skill: Dev10x:gh-pr-monitor
        guardrails: failure detection, fixup commits, re-monitor after push
    reason: >
      A hand-rolled while/sleep loop around `gh pr checks` reinvents
      ci_check_status(wait=true) and the gh-pr-monitor skill. The loop
      exits on the first tick, skips bot-review checks, and does no
      fixup/re-monitor — route to the wrapper/skill instead (GH-488 #22).
    related:
      - Dev10x:gh-pr-monitor

  - name: cat-grep-pipeline
    matcher: Bash
    patterns:
      - "cat .*\\|.*grep"
      - "grep .*\\{[^}]*,[^}]*\\}"
    hook_block: false
    compensations:
      - type: use-tool
        tool: Grep
        guardrails: file search without pipe/brace core-harness friction
        description: >
          Use the Grep tool to search files. A `cat file | grep x`
          pipeline and a `grep x file.{a,b}` brace expansion both trip
          non-allow-listable core-harness checks (pipe, brace) — the
          Grep tool searches directly without the friction.
    reason: >
      `cat | grep` and brace-expansion `grep {a,b}` recur as friction
      because the pipe and brace shapes are not allow-listable core
      checks. The Grep tool covers both with no permission prompt
      (GH-488 #15/#28).

  - name: find-search
    matcher: Bash
    patterns:
      # `find … -exec <search-tool>` and name-glob searches — the
      # archetypal un-allowable find shape (GH-726 F2/F3).
      - "find .*-exec\\s+(grep|egrep|fgrep|rg|cat|wc|head|tail|sort|sed|awk)"
      - "find .*-(name|iname|path|regex)\\b"
    hook_block: false
    compensations:
      - type: use-tool
        tool: Grep
        guardrails: recursive search by glob/type, no Bash allow-rule, no find -exec
        description: >
          Use the Grep tool (wraps ripgrep) to search file contents — set
          glob/type and output_mode (files_with_matches / count) instead of
          `find … -exec grep`.
      - type: use-tool
        tool: Glob
        guardrails: name-glob file discovery, no Bash allow-rule
        description: >
          Use the Glob tool to find files by name pattern instead of
          `find -name`. For a one-shot Bash search, `rg -l <pat> -g '<glob>'`
          is already covered by Bash(rg:*).
    reason: >
      `find` is structurally un-allowable: `Bash(find:*)` does not reliably
      match embedded paths/pipes, and `find … -exec <cmd>` is independently
      blocked because -exec wraps an arbitrary command (defeating the inner
      tool's allow-rule). The fix is tool substitution, not a new allow-rule
      — steer searches to ripgrep / the Grep + Glob tools (GH-726 F2/F3,
      themes T1 + T3).

  - name: fish-interactive-abbr
    matcher: Bash
    patterns:
      - "fish -ic"
      - "fish -i -c"
    hook_block: false
    compensations:
      - type: use-alternative
        description: >
          Run the underlying command directly, or invoke the documented
          Dev10x skill/alias the abbreviation maps to. fish abbreviations
          only expand in an interactive shell; spawning `fish -ic` to
          expand one is avoidable friction.
    reason: >
      `fish -ic <abbr>` expands a shell abbreviation by launching an
      interactive subshell — friction with no allow-rule. Run the real
      command or the documented skill/alias instead (GH-488 #18).

  - name: version-pinned-plugin-script
    matcher: Bash
    patterns:
      - "plugins/cache/.*/[0-9]+\\.[0-9]+\\.[0-9]+/"
      - "/cache/.*/[0-9]+\\.[0-9]+\\.[0-9]+/.*\\.py"
    hook_block: false
    compensations:
      - type: use-alternative
        description: >
          Route UP to the stable surface: invoke the skill via Skill()
          or call the installed `dev10x` CLI. Never call a script at a
          version-pinned plugins/cache/<version>/ path — the path rots
          on the next plugin upgrade.
    reason: >
      A version-pinned `…/cache/<version>/…/*.py` script path degrades
      on every plugin upgrade. Route up to the skill invocation or the
      stable installed CLI so the call survives version bumps (GH-488 #26).

  # ── Edit|Write rules ───────────────────────────────────────

  - name: eval-in-skills
    matcher: "Edit|Write"
    file_pattern: '/\.claude/skills/.*\.(md|sh)$'
    content_pattern: '\beval\s+["$]'
    hook_block: true
    message: >
      eval is not allowed in skill files — it executes arbitrary
      code via double expansion.
    compensations:
      - type: use-alternative
        description: 'Use source <(script.sh) instead of eval "$(script.sh)"'
      - type: file-issue
        description: >
          If a skill explicitly instructs using eval, file an issue
          at the plugin repo — the skill instructions need updating.
    reason: >
      eval executes arbitrary code via double expansion and is
      not allowed in skill files.

  - name: sensitive-files
    matcher: "Edit|Write"
    file_names: [".env", "secrets.env", ".secret"]
    file_prefixes: [".env.", "secrets.env."]
    file_substrings: ["credentials"]
    hook_block: true
    message: "BLOCKED: Editing sensitive file: {file_path}"
    compensations:
      - type: use-alternative
        description: >
          Sensitive files must not be edited by Claude. Ask the user
          to make changes manually.
    reason: >
      Prevents accidental exposure or modification of secrets,
      credentials, and environment-specific configuration.
