# GH-271 permission-friction fixtures — command_class: fence-tool
#
# Package-runner / environment-fence tools (npx, uv run, uvx, yarn,
# pnpm dlx, pipx run, bunx, railway). They execute arbitrary downstream
# code, so the default effect is `ask` (broad-ask) — NEVER a blanket
# allow. Specific safe sub-forms (e.g. `uv run pytest`, `<tool> --version`)
# may be `allow` via narrow rules, and the catch-all `Bash(<tool> *)`
# shape must be FORBID (the option-2 UI footgun). Classifications
# RE-DERIVED from the command + catalog + reflections. See README.md.

command_class: fence-tool
rows:
  - id: "#42"
    command: "yarn test:shared <suite>"
    tool: Bash
    friction: null
    effect: ask
    reversibility: none
    rule: "Bash(yarn test:*)"
    notes: >
      `yarn test` runs project test code (arbitrary downstream). Broad
      ask; a project may narrow to `Bash(yarn test:*)` as a specific allow.

  - id: "#189"
    command: "uv sync --dry-run"
    tool: Bash
    friction: null
    effect: ask
    reversibility: trivial
    rule: "Bash(uv sync --dry-run:*)"
    notes: >
      `--dry-run` is read-only, but `uv sync` is a fence-tool surface;
      ask keeps the broad shape gated while the dry-run sub-form is safe.

  - id: "#225"
    command: "railway --version"
    tool: Bash
    friction: null
    effect: allow
    reversibility: trivial
    rule: "Bash(railway --version)"
    notes: >
      `--version` is a safe sub-form of the railway fence-tool — narrow
      allow (per catalog railway-cli tier-3). The bare `railway *` shape
      stays ask/forbid.

  - id: "#74"
    command: "uv run --project <dir> ruff format <paths>"
    tool: Bash
    friction: option-2-footgun
    effect: ask
    reversibility: trivial
    rule: "Bash(uv run *)"
    notes: >
      Re-derived from extractor `arbitrary-code/allow`. `uv run` is a
      fence-tool; the option-2 footgun `Bash(uv run *)` is the most
      dangerous catch-all (defeats the fence model) — forbid that shape.

  - id: "#200"
    command: "DJANGO_SETTINGS_MODULE=<mod> uv run python manage.py makemigrations <app>"
    tool: Bash
    friction: null
    effect: deny
    reversibility: assisted
    rule: "Bash(DJANGO_SETTINGS_MODULE=:*)"
    notes: >
      Manually injecting `DJANGO_SETTINGS_MODULE=` is an anti-pattern: the
      project should detect its own run mode (its settings/env), not have
      the agent force the settings module. Deny the env-prefix form to
      push the correct invocation. (Maintainer-directed, GH-616.)

  - id: "#233"
    command: "uv run --with pytest pytest <test>"
    tool: Bash
    friction: null
    effect: ask
    reversibility: none
    rule: "Bash(uv run *)"
    notes: >
      `--with` pulls an arbitrary dependency then executes — fence-tool
      ask. (Tests should route through Skill(test), not raw uv run.)

  - id: "#319"
    command: "uv run --directory apps/api python manage.py makemigrations <app>"
    tool: Bash
    friction: null
    effect: ask
    reversibility: assisted
    rule: "Bash(uv run *)"
    notes: Same shape as #200 with `--directory`; migration write → ask.

  - id: "#31"
    command: "npx vercel inspect <deployment-id> --logs"
    tool: Bash
    friction: permission-prompt
    effect: allow
    reversibility: trivial
    rule: "Bash(npx vercel inspect:*)"
    notes: >
      `npx vercel inspect --logs` is a read-only deployment inspection.
      Narrow allow on the specific read sub-form (same pattern as
      `railway --version` #225); bare `npx *` stays ask. (Maintainer-
      directed reclassification, GH-616.)

  - id: "#146"
    command: "uvx dev10x permission --help"
    tool: Bash
    friction: null
    effect: allow
    reversibility: trivial
    rule: "Bash(uvx dev10x:*)"
    notes: >
      `dev10x` is the project's OWN trusted CLI — `uvx dev10x <anything>`
      is not arbitrary downstream code, so the whole family is allowed via
      the narrow `Bash(uvx dev10x:*)` rule. Bare `uvx *` / `npx *` stay
      ask. (Maintainer-directed reclassification, GH-616.)

  - id: "#157"
    command: "uv run --directory apps/api lint-imports"
    tool: Bash
    friction: null
    effect: ask
    reversibility: none
    rule: "Bash(uv run *)"
    notes: "`uv run <tool>` is a fence-tool surface → broad ask."

  - id: "#168"
    command: "npm install"
    tool: Bash
    friction: null
    effect: ask
    reversibility: assisted
    rule: "Bash(npm install:*)"
    notes: >
      Installs deps and runs lifecycle scripts (arbitrary downstream) →
      fence-tool ask. Project policy prefers `pnpm`; lockfile changes are
      assisted-reversible.

  - id: "#274"
    command: "DJANGO_SETTINGS_MODULE=<mod> uv run python manage.py check --deploy --fail-level ERROR"
    tool: Bash
    friction: hook-block
    effect: deny
    reversibility: none
    rule: "Bash(DJANGO_SETTINGS_MODULE=:*)"
    notes: >
      Same anti-pattern as #200: a manual `DJANGO_SETTINGS_MODULE=` prefix
      forces the run mode the project should detect itself. Deny the
      env-prefix form even for the read-only `check` verb. (Maintainer-
      directed, GH-616.)

  - id: "#277"
    command: "uv add --project apps/e2e <package>"
    tool: Bash
    friction: null
    effect: ask
    reversibility: assisted
    rule: "Bash(uv add:*)"
    notes: >
      `uv add` resolves+installs a dependency and edits pyproject/lock
      (assisted-reversible) → fence-tool ask. Re-derived from extractor
      `arbitrary-code`+`allow`.
