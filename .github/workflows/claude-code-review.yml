name: Claude Code Review

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]
    paths:
      - "**/*.py"
      - "**/*.sh"
      - "**/*.yaml"
      - "**/*.yml"
      - "**/Makefile"
      - "skills/**/SKILL.md"
      - "CLAUDE.md"
      - ".claude/rules/**/*.md"
      - "references/**/*.md"
      - ".claude/agents/**/*.md"
      - "!.github/workflows/claude*.yml"

jobs:
  claude-review:
    if: >-
      !github.event.pull_request.draft

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Skip if duplicate SHA run exists
        id: dedup
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PEER_RUN=$(gh api \
            "repos/${{ github.repository }}/actions/runs?head_sha=${{ github.sha }}&per_page=10" \
            --jq "[.workflow_runs[] | select(.name == \"${{ github.workflow }}\" and .id != ${{ github.run_id }} and .conclusion != \"cancelled\" and .conclusion != \"skipped\" and .status != \"queued\")] | first | .id // empty" \
            2>/dev/null || true)
          if [ -n "$PEER_RUN" ]; then
            echo "::notice::Skipping duplicate run — SHA ${{ github.sha }} already handled by run $PEER_RUN"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if PR already merged or closed
        if: steps.dedup.outputs.skip != 'true'
        id: pr-state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATE=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} --json state -q '.state')
          if [ "$STATE" != "OPEN" ]; then
            echo "::notice::Skipping — PR #${{ github.event.pull_request.number }} is $STATE"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.dedup.outputs.skip != 'true' && steps.pr-state.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        if: steps.dedup.outputs.skip != 'true' && steps.pr-state.outputs.skip != 'true'
        id: claude-review
        uses: anthropics/claude-code-action@f87768c6d25f92ae6efa7175e223ef77d4cbf97f # v1.0.166
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are performing an automated code review using a multi-agent
            architecture. Be brief but thorough.

            STEP 1 — LOAD CORE RULES:
            Read these files first:
            - references/review-guidelines.md (workflow, threads, summaries)
            - references/review-checks-common.md (false positive prevention)
            - CLAUDE.md (project conventions)

            STEP 2 — CLASSIFY PR TYPE:
            Check PR title and description for:
            - POC/test code (🧪, "POC", "demo", "prototype") → relaxed standards
            - Revert PR ("Revert" in title) → REQUEST_CHANGES, require explanation
            - Stacked PR ("Stacked on #N", "Depends on #N") → note in summary,
              focus review on changes unique to THIS PR, not the base PR

            PR metadata (title, body, commits) is checked by claude-pr-hygiene.yml.
            Do NOT provide feedback on those items.

            STEP 3 — DOMAIN-ROUTED REVIEW (delegate to haiku subagents):
            Run `gh pr diff ${{ github.event.pull_request.number }} --stat` to
            classify changed files. For EACH affected domain, dispatch ONE
            subagent via the Task tool using the registered agent name below
            (the .claude/agents/ specs carry `model: haiku` frontmatter, so the
            per-rule review work runs on the cheap tier while you — the
            orchestrator — only route, deduplicate, verify, and post):

            - Skills (skills/**) → reviewer-skill AND reviewer-skill-behavior
            - Infrastructure (Makefile, **/*.sh, bin/**, hooks/**,
              .github/workflows/**) → reviewer-infra
            - Documentation (docs/**/*.md, .claude/**/*.md, CLAUDE.md,
              README.md) → reviewer-docs
            - Rules/agents (.claude/rules/**, .claude/agents/**,
              agents/**, references/**) → reviewer-rules-maintenance
            - Python/shell code (**/*.py, **/*.sh, not covered above)
              → reviewer-generic

            Dispatch all matched subagents in ONE message so they run in
            parallel. Each subagent prompt MUST include:
            1. The list of changed files for its domain and the PR number
               (the agent reads actual files at HEAD; it must not rely on
               diff snippets alone)
            2. Its Required Reading rule files (the agent spec lists them)
            3. This coverage-first instruction, verbatim: "Report every
               issue you find, including ones you are uncertain about or
               consider low-severity. Do not filter for importance or
               confidence — the orchestrator verifies and ranks findings.
               For each finding include file:line, severity (CRITICAL /
               WARNING / INFO), confidence, and a one-sentence rationale."

            Only dispatch agents for domains with changed files. When a
            domain has more than ~15 changed files, split it across two
            subagents by directory.

            When the subagents return, YOU (the orchestrator) must:
            1. Deduplicate findings that multiple agents raised on the
               same file:line
            2. Check every finding against
               references/review-checks-common.md and drop false-positive
               matches (note the dropped count in the summary)
            3. Filter by confidence and severity — post CRITICAL/WARNING
               findings; include INFO only when clearly actionable
            4. Verify surviving findings against actual code (Read the
               file at the cited line) before posting

            STEP 4 — CROSS-CUTTING CHECKS:
            Apply to ALL files regardless of domain:
            - Dead code detection (Grep for imports of new classes/functions)
            - Parameter change analysis (Grep ALL call sites, not just diff)
            - Code verification (read actual file before claiming errors)
            - Scope awareness (only review changed lines; pre-existing issues
              are "out of scope")

            STEP 5 — PRODUCE REVIEW OUTPUT:
            Follow the review workflow from review-guidelines.md:
            - Check existing review comments to avoid duplicates
            - Before writing a summary, search previous summaries
              (`gh pr view {PR_NUMBER} --json comments`) to determine the
              correct round number (highest existing round + 1)
            - Use inline comments for specific issues
            - Create ONE summary comment per review cycle
            - Positive validation when PR has no issues
            - After author pushes fixes: acknowledge, focus on new issues only

            Be constructive and helpful in your feedback.

            STEP 6 — HIDE OBSOLETE REVIEW SUMMARIES:
            Before posting the new summary, follow review-guidelines.md step 6
            to minimize previous Claude review summaries where ALL associated
            review threads are resolved. Use `gh api graphql` to query
            `reviewThreads` (check `isResolved`, group by review) and
            `minimizeComment` mutation to hide fully-resolved summaries.
            Leave reviews with any unresolved threads visible.

            STEP 7 — CONVERT TO DRAFT IF ISSUES FOUND:
            After completing the review, check the real inline-comment count
            from the GitHub API — do NOT rely on your own recollection of
            whether you called create_inline_comment:
              `gh pr view ${{ github.event.pull_request.number }} --json reviewComments --jq '.reviewComments | length'`
            If the returned count is greater than 0, convert the PR to draft:
              `gh pr ready --undo ${{ github.event.pull_request.number }}`
            This lets the author fix all issues without triggering re-reviews
            on each fixup push. The author marks "Ready for review" when done.
            If the count is 0 (no inline comments), do NOT convert to draft.

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # Cost shape: the sonnet orchestrator handles routing, dedup,
          # verification, and posting (a small share of tokens); the bulk
          # per-domain rule review runs on haiku subagents dispatched from
          # .claude/agents/ frontmatter (the cheap tier). Task is required
          # for subagent dispatch.
          claude_args: '--model sonnet --allowed-tools "Task,Read,Grep,Glob,mcp__github_inline_comment__create_inline_comment,mcp__github__get_pull_request_review_comments,Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh pr ready:*),Bash(gh api:*)"'
